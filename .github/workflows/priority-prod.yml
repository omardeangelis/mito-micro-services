name: Update Priority PROD
run-name: Update Priority PROD

env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL_PROD }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_KEY_PROD }}
  CRON_SECRET_KEY: ${{ secrets.CRON_SECRET_KEY }}

on:
  workflow_dispatch:
  # schedule:  # disabilitato su ambiente di test
  #   # Esecuzione alle 00:00 UTC (01:00 CET) ogni giorno
  #   - cron: "30 1 * * *"

jobs:
  delete-supabase-storage:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: pnpm/action-setup@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"
      - name: Install pnpm
        run: npm install -g pnpm
      - name: Install dependencies
        run: pnpm install
      - name: Run update priority script
        run: pnpm update:priority
      - name: Send Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} -d text="PROD: Cron job ran and updated priority."
